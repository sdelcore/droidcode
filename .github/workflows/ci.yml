name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --include=optional

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build
        env:
          # vite-plugin-pwa needs an explicit base for prod builds.
          NODE_ENV: production
